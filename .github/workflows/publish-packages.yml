name: Publish Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, without the leading v, e.g. 0.1.0 or 0.1.0-rc1
        required: true
        type: string
      modules:
        description: >-
          Optional: space/comma-separated modules to publish a partial release, e.g.
          "onec-framework onec-framework-starter onec-ui-starter". Empty = publish everything.
          IMPORTANT: a subset must be dependency-closed — modules share one version and their
          published POMs reference the other onec-* modules at the SAME version, so include every
          onec-* module your selection depends on. A partial run skips the git tag / GitHub release.
        required: false
        type: string
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish Maven artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${VERSION}" >&2
            exit 1
          fi

          echo "release_version=${VERSION}" >> "${GITHUB_OUTPUT}"
          if [[ "${VERSION}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Resolve publish targets
        id: targets
        shell: bash
        run: |
          # Tag pushes (and a dispatch with no modules) publish everything. A dispatch with an
          # explicit module list publishes only those modules' :publish tasks.
          MODULES="${{ inputs.modules }}"
          MODULES="${MODULES//,/ }"
          if [[ -z "${MODULES// }" ]]; then
            echo "tasks=publish" >> "${GITHUB_OUTPUT}"
            echo "full=true" >> "${GITHUB_OUTPUT}"
            echo "Publishing ALL modules."
          else
            TASKS=""
            for m in ${MODULES}; do
              if [[ ! "${m}" =~ ^onec-[a-z0-9-]+$ ]]; then
                echo "Invalid module name: '${m}'" >&2
                exit 1
              fi
              if [[ ! -f "${m}/build.gradle.kts" ]]; then
                echo "No such module: '${m}'" >&2
                exit 1
              fi
              TASKS="${TASKS} :${m}:publish"
            done
            echo "tasks=${TASKS}" >> "${GITHUB_OUTPUT}"
            echo "full=false" >> "${GITHUB_OUTPUT}"
            echo "Publishing only:${TASKS}"
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Check
        run: ./gradlew clean check -PreleaseVersion="${{ steps.version.outputs.release_version }}"

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew ${{ steps.targets.outputs.tasks }} -PreleaseVersion="${{ steps.version.outputs.release_version }}"

      # Only a full release stamps a git tag + GitHub release. A partial (subset) run just
      # publishes those packages, since a global vX.Y.Z tag would misrepresent the other modules.
      - name: Create GitHub release
        if: steps.targets.outputs.full == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.release_version }}
          name: onec-framework ${{ steps.version.outputs.release_version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
