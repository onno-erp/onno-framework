name: Publish Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, without the leading v, e.g. 0.1.0 or 0.1.0-rc1
        required: true
        type: string

# Artifacts publish to Maven Central (Central Portal), not GitHub Packages — so no `packages: write`.
# `contents: write` is still needed to create the GitHub release.
permissions:
  contents: write

jobs:
  publish:
    name: Publish Maven artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${VERSION}" >&2
            exit 1
          fi

          echo "release_version=${VERSION}" >> "${GITHUB_OUTPUT}"
          if [[ "${VERSION}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Check
        run: ./gradlew clean check -PreleaseVersion="${{ steps.version.outputs.release_version }}"

      - name: Publish to Maven Central
        # Uploads a signed deployment to the Central Portal. SONATYPE_AUTOMATIC_RELEASE=true
        # (gradle.properties) makes it release automatically once the Portal validates it — no
        # manual "Publish" click. Set that property to false to instead leave deployments staged.
        env:
          # Central Portal user token (Account → Generate User Token), exposed as Gradle properties.
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          # ASCII-armored GPG private key + its passphrase, for signing the release artifacts.
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew publishToMavenCentral -PreleaseVersion="${{ steps.version.outputs.release_version }}" --no-configuration-cache

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.release_version }}
          name: onno-framework ${{ steps.version.outputs.release_version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true

      - name: Mirror to the onno-cloud module registry
        # Push the same open-source artifacts to onno-cloud's /modules registry so onno's own builds
        # (onno-enterprise, tenant builds) resolve this release instantly instead of waiting for Maven
        # Central to sync. Central (above) is the canonical channel and already succeeded; this is a
        # best-effort mirror — if it fails (registry down, missing token) re-run just this task with
        # `./gradlew publishAllPublicationsToOnnoCloudRepository -PreleaseVersion=<v>`, without
        # re-touching Central. The publication is signed, so the signing key is needed here too.
        env:
          ONNO_REGISTRY_URL: ${{ vars.ONNO_REGISTRY_URL || 'https://cloud.onno.su/modules' }}
          ONNO_REGISTRY_USER: ${{ secrets.ONNO_REGISTRY_USER || 'publisher' }}
          ONNO_REGISTRY_TOKEN: ${{ secrets.ONNO_REGISTRY_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew publishAllPublicationsToOnnoCloudRepository -PreleaseVersion="${{ steps.version.outputs.release_version }}" --no-configuration-cache

      - name: Mirror the widgets Gradle plugin to the onno-cloud module registry
        # The su.onno.widgets plugin lives in a pluginManagement includeBuild, so the root mirror
        # step above never reaches it — publish its project explicitly. Consumers with custom widgets
        # (e.g. tenant apps built by onno-cloud in a container with no local checkout) resolve
        # `id("su.onno.widgets") version <v>` from here. Its publications aren't signed, so no key.
        env:
          ONNO_REGISTRY_URL: ${{ vars.ONNO_REGISTRY_URL || 'https://cloud.onno.su/modules' }}
          ONNO_REGISTRY_USER: ${{ secrets.ONNO_REGISTRY_USER || 'publisher' }}
          ONNO_REGISTRY_TOKEN: ${{ secrets.ONNO_REGISTRY_TOKEN }}
        run: ./gradlew :onno-widgets-gradle-plugin:publishAllPublicationsToOnnoCloudRepository -PreleaseVersion="${{ steps.version.outputs.release_version }}" --no-configuration-cache
