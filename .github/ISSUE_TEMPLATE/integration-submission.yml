name: Community integration submission
description: Propose a community-built integration for the INTEGRATIONS.md catalog.
title: "[integration] <name>"
labels: ["community-integration"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for building on onec-framework! Use this form to propose your integration for the
        [community catalog](https://github.com/onec-erp/onec-framework/blob/main/INTEGRATIONS.md).

        You can also skip the issue and open a PR directly that adds your entry to
        [`community/registry.json`](https://github.com/onec-erp/onec-framework/blob/main/community/registry.json)
        and regenerates `INTEGRATIONS.md` (`./gradlew generateIntegrationsDoc`). See the
        [listing criteria](https://github.com/onec-erp/onec-framework/blob/main/CONTRIBUTING.md#listing-a-community-integration).
  - type: input
    id: name
    attributes:
      label: Name
      description: e.g. onec-shopify-starter
    validations:
      required: true
  - type: input
    id: repository
    attributes:
      label: Repository URL
      placeholder: https://github.com/you/onec-something-starter
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: One sentence — what does it do?
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - connector (wraps an external API)
        - spi (implements a framework SPI — MediaStorage, MailDispatcher, auth, …)
        - ui (custom widgets / pages / actions)
        - skill (Claude skill or plugin)
        - library (general helper)
    validations:
      required: true
  - type: input
    id: coordinates
    attributes:
      label: Maven coordinates
      description: "group:artifact[:version] — leave blank if not published to Maven."
      placeholder: io.github.you:onec-shopify-starter
    validations:
      required: false
  - type: input
    id: onecVersion
    attributes:
      label: onec-framework version
      description: The version (or range) you build and test against.
      placeholder: 0.10.x
    validations:
      required: true
  - type: input
    id: license
    attributes:
      label: License
      description: SPDX identifier.
      placeholder: Apache-2.0
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - active
        - experimental
        - unmaintained
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Readiness
      description: See docs/EXTENDING.md for the full "definition of done".
      options:
        - label: It builds against a supported onec-framework version and has a README.
          required: true
        - label: It uses my own Maven group and Java package (not io.github.onec-erp / com.onec.*).
          required: true
        - label: It has a declared license and (for starters) an `onec.<name>.enabled` flag.
          required: true
