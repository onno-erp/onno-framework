<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin: 0; padding: 0; background: #f4f4f5;">
<!--
  Shared mail layout. Templates fill the body via:
    <div th:replace="~{layouts/base :: page(~{::content})}"></div>
  and define a fragment:
    <div th:fragment="content"> ... </div>
-->
<div th:fragment="page(content)"
     style="max-width: 600px; margin: 0 auto; padding: 24px;
            font-family: Helvetica, Arial, sans-serif; color: #222; line-height: 1.5;">

    <div style="padding: 8px 0 16px 0; border-bottom: 1px solid #e4e4e7;">
        <span style="font-weight: 600; font-size: 16px;">Rentals</span>
    </div>

    <div style="padding: 24px 0;" th:insert="${content}">
        Fallback content
    </div>

    <div style="padding-top: 16px; border-top: 1px solid #e4e4e7; color: #999; font-size: 12px;">
        <p style="margin: 0;">You're receiving this because of activity on your account.</p>
    </div>
</div>
</body>
</html>
