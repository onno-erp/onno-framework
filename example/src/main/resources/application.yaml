spring:
  output:
    ansi:
      enabled: always
  datasource:
    url: jdbc:h2:file:./data/example;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  mail:
    host: localhost
    port: 1025
server:
  error:
    include-stacktrace: always
    include-message: always
onec:
  ui:
    # The built-in Settings page (the @Constant editor) is opt-in and off by default; this app
    # composes its own SettingsPage at /settings, so turn the surface + admin nav entry on.
    settings:
      enabled: true
  # Let the onec-mobile app open from this server's https:// links (iOS Universal Links / Android
  # App Links). The two /.well-known files 404 until set; values are deployment-specific (Apple Team
  # ID, app bundle id / package, signing-cert SHA-256). Self-hosted servers can set these, but the
  # app only registers *.cloud.onno.su at build time — others fall back to the onec:// scheme / QR.
  # app-links:
  #   apple-app-ids:
  #     - "ABCDE12345.su.onno.onec.mobile"   # <TeamID>.<bundleId>
  #   android:
  #     - package-name: su.onno.onec.mobile
  #       sha256-cert-fingerprints:
  #         - "AB:CD:EF:..."
  auth:
    # Authentication backend. Default is "in-memory" (the onec.auth.users below). Set to
    # "oidc" for server-side OIDC login (Keycloak, Zitadel, …; keeps the session cookie, "Sign in"
    # becomes a redirect to the IdP), or "resource-server" for stateless JWT bearer-token
    # validation. See the commented spring.security.oauth2.* blocks at the bottom of this file.
    mode: in-memory
    # Session longevity for the cookie-based modes (in-memory, oidc). Defaults shown; tune as needed.
    # The idle timeout slides on every request and overrides Spring's 30-minute default, so a
    # parked-but-open tab keeps its session for a working day. remember-me (in-memory only) re-signs
    # the user in from a persistent cookie after the session lapses — set a stable key in production.
    session:
      timeout: 8h
      remember-me:
        enabled: true
        validity: 14d
        # Single-node dev: start with a built-in non-secret key when no key is set. In production (or
        # any multi-node deployment) set a stable `key` instead — a blank key without this opt-in
        # fails fast, since per-node keys break remember-me behind a load balancer.
        allow-ephemeral-key: true
        # key: ${ONEC_REMEMBER_ME_KEY:}   # stable secret in prod / multi-node
    users:
      - username: admin
        password: admin
        roles: [ADMIN]
      - username: rentals
        password: rentals
        roles: [RENTALS]
      - username: finance
        password: finance
        roles: [FINANCE]
      - username: ana@rentals.local
        password: cleaner
        roles: [CLEANER]
    # OIDC settings (used only by the oidc / resource-server modes). A "provider" preset fills the
    # IdP-specific defaults — Keycloak roles come from realm_access.roles; Zitadel roles from the
    # urn:zitadel:iam:org:project:roles claim (keyed by role name) — and everything is overridable.
    # oidc:
    #   provider: keycloak            # keycloak | zitadel | custom
    #   registration-id: keycloak     # preset default; must match spring.security.oauth2.client.registration.*
    #   principal-claim: preferred_username
    #   roles:
    #     prefix: "ROLE_"
    #     # Keycloak ergonomics (ignored by other presets): also map a client's roles.
    #     realm-roles: true
    #     client-roles: false
    #     client-id: rentals-app
    #     # Or drive any IdP explicitly (provider: custom):
    #     # sources:
    #     #   - { claim: "urn:zitadel:iam:org:project:roles", shape: object-keys }
    #     #   - { claim: "realm_access", shape: array }
    #   # RP-initiated logout (oidc mode): GET this path to end both the app session and the IdP SSO
    #   # session, then return to post-logout-redirect-uri. {baseUrl} = this app's origin, which must
    #   # be registered under the IdP client's "Valid post logout redirect URIs" (e.g. .../*).
    #   logout-path: /logout
    #   post-logout-redirect-uri: "{baseUrl}"
  mcp:
    enabled: true
  mail:
    enabled: true
    provider: smtp
    default-from: "rentals@example.local"
    use-outbox: true
  print:
    enabled: true
  media:
    # Binary uploads (image/file widgets, POST /api/media) stream to disk here instead of being
    # base64'd into a field. Kept next to the H2 file DB so uploads survive restarts in dev.
    filesystem:
      directory: ./data/media
    # max-file-size: 10MB
    # allowed-content-types: [image/*, application/pdf]

# --------------------------------------------------------------------------------------------
# OIDC wiring. Uncomment ONE of the blocks below and set onec.auth.mode accordingly.
# On the IdP client, register the redirect URI <app>/login/oauth2/code/{registrationId} and add
# the app origin to the "Valid post logout redirect URIs" so RP-initiated logout can return here.
#
# Keycloak login (onec.auth.mode: oidc, onec.auth.oidc.provider: keycloak):
# spring:
#   security:
#     oauth2:
#       client:
#         provider:
#           keycloak:
#             issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8080/realms/onec}
#         registration:
#           keycloak:
#             client-id: ${KEYCLOAK_CLIENT_ID:rentals-app}
#             client-secret: ${KEYCLOAK_CLIENT_SECRET:}
#             authorization-grant-type: authorization_code
#             scope: [openid, profile, email]
#
# Zitadel login (onec.auth.mode: oidc, onec.auth.oidc.provider: zitadel):
# spring:
#   security:
#     oauth2:
#       client:
#         provider:
#           zitadel:
#             issuer-uri: ${ZITADEL_ISSUER:https://your-instance.zitadel.cloud}
#         registration:
#           zitadel:
#             client-id: ${ZITADEL_CLIENT_ID:}
#             client-secret: ${ZITADEL_CLIENT_SECRET:}
#             authorization-grant-type: authorization_code
#             scope: [openid, profile, email]
#
# Resource server (onec.auth.mode: resource-server) — stateless JWT bearer tokens:
# spring:
#   security:
#     oauth2:
#       resourceserver:
#         jwt:
#           issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8080/realms/onec}
# --------------------------------------------------------------------------------------------
