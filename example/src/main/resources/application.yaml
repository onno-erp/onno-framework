spring:
  application:
    name: onno-books
  output:
    ansi:
      enabled: always
  datasource:
    url: jdbc:h2:file:./data/bookstore;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
server:
  error:
    include-stacktrace: always
    include-message: always
onno:
  ui:
    # The built-in @Constant editor / Settings page — on, so the single Store Name constant is
    # editable in-app (the one knob this example ships under Settings).
    settings:
      enabled: true
  # Per-document discussion threads, opted into per view via EntityView.comments(). Used on Orders.
  comments:
    enabled: true
  auth:
    # In-memory users (the default). Two roles: ADMIN (dashboard + staff management) and MANAGER
    # (runs the shop). Change these passwords before any real use.
    mode: in-memory
    session:
      timeout: 8h
      remember-me:
        enabled: true
        validity: 14d
        # Single-node dev: start with a built-in non-secret key. Set a stable `key` in production.
        allow-ephemeral-key: true
    users:
      - username: admin
        password: admin
        roles: [ADMIN]
      - username: manager
        password: manager
        roles: [MANAGER]
  media:
    # Book-cover uploads (the image widget, POST /api/media) stream to disk here. Kept next to the
    # H2 file DB so uploads survive restarts in dev.
    filesystem:
      directory: ./data/media
