spring:
  application:
    name: onno-books
  output:
    ansi:
      enabled: always
  datasource:
    url: jdbc:h2:file:./data/bookstore;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
server:
  error:
    include-stacktrace: always
    include-message: always
  servlet:
    session:
      cookie:
        # Cross-site iframes require SameSite=None plus Secure (HTTPS). Local development keeps
        # normal Lax/non-secure cookies; set both env vars on the hosted landing-page demo.
        same-site: ${ONNO_DEMO_COOKIE_SAME_SITE:lax}
        secure: ${ONNO_DEMO_COOKIE_SECURE:false}
onno:
  ui:
    locale: ru
    # One-tap demo logins on the sign-in screen (demo-only: passwords reach the browser). Each button
    # signs in as the matching in-memory user below, so an evaluator never types the email/password.
    login:
      demo-accounts:
        - label: Sign in as Admin
          username: admin@onnobooks.local
          password: admin
        - label: Sign in as Store manager
          username: manager@onnobooks.local
          password: manager
  # Per-document discussion threads, opted into per view via EntityView.comments(). Used on Orders.
  comments:
    enabled: true
  # The top-right notification center. On by default; shown here to make the two built-in producers
  # explicit. Mentions fire when a staff member is @-mentioned in an order comment; assignments fire
  # when an order's @AssigneeField (Order.assignedTo) is set to an employee.
  notifications:
    enabled: true
    mentions:
      enabled: true
    assignments:
      enabled: true
  auth:
    # In-memory users (the default). Two roles: ADMIN (dashboard + staff management) and MANAGER
    # (runs the shop). Usernames are the staff email addresses so a signed-in user links to their
    # Employee row (see MainLayout.identity) — that's what lets the shell show their photo bottom-left
    # and greet them by name. Change these passwords before any real use.
    mode: in-memory
    demo:
      # Public demo convenience: every anonymous API request becomes the manager without exposing
      # the password to browser JavaScript. Remove this setting for any non-demo deployment.
      auto-login-username: manager@onnobooks.local
    embedding:
      # TEMPORARY public-demo policy: allow any site to frame the app. Set the env var to an exact
      # comma-separated allowlist (e.g. "'self',https://www.onno.su") before production use.
      frame-ancestors: ${ONNO_DEMO_FRAME_ANCESTORS:*}
      # Applies SameSite=None; Secure to the separate XSRF-TOKEN cookie when the hosted iframe uses
      # secure cross-site cookies. Kept in lockstep with the JSESSIONID setting above.
      cross-site-cookies: ${ONNO_DEMO_COOKIE_SECURE:false}
    session:
      timeout: 8h
      remember-me:
        enabled: true
        validity: 14d
        # Single-node dev: start with a built-in non-secret key. Set a stable `key` in production.
        allow-ephemeral-key: true
    users:
      - username: admin@onnobooks.local
        password: admin
        roles: [ADMIN]
      - username: manager@onnobooks.local
        password: manager
        roles: [MANAGER]
  media:
    # Book-cover uploads (the image widget, POST /api/media) stream to disk here. Kept next to the
    # H2 file DB so uploads survive restarts in dev.
    filesystem:
      directory: ./data/media
