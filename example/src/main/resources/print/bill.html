<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="'Bill ' + ${doc.number}">Bill</title>
    <style>
        @page { size: A4; margin: 22mm 18mm; }
        body { font-family: Helvetica, Arial, sans-serif; font-size: 11pt; color: #222; }
        h1 { font-size: 18pt; margin: 0 0 4pt 0; letter-spacing: 1pt; }
        .muted { color: #777; font-size: 9pt; }
        .bar { border-bottom: 2pt solid #222; margin: 12pt 0 18pt; }
        table { width: 100%; border-collapse: collapse; }
        td.label { color: #555; padding: 2pt 8pt 2pt 0; vertical-align: top; }
        td.value { padding: 2pt 0; vertical-align: top; }
        .totals { margin-top: 28pt; width: 60%; margin-left: auto; }
        .totals td { padding: 4pt 8pt; }
        .totals tr.gross td { border-top: 1pt solid #222; font-weight: bold; font-size: 13pt; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; text-align: center; font-size: 8pt; color: #999; }
    </style>
</head>
<body>
    <h1>FACTURA</h1>
    <div class="muted">
        Bill No. <span th:text="${doc.number}">BILL-000000001</span>
        &nbsp;·&nbsp;
        Date <span th:text="${#temporals.format(doc.date, 'dd MMM yyyy')}">01 Jan 2024</span>
    </div>
    <div class="bar"></div>

    <table>
        <tr>
            <td class="label">Cliente</td>
            <td class="value" th:text="${doc.client != null} ? ${doc.client} : '—'">—</td>
        </tr>
        <tr>
            <td class="label">Property</td>
            <td class="value" th:text="${doc.property != null} ? ${doc.property} : '—'">—</td>
        </tr>
        <tr th:if="${doc.bookingRef != null}">
            <td class="label">Booking</td>
            <td class="value" th:text="${doc.bookingRef}">—</td>
        </tr>
    </table>

    <table class="totals">
        <tr>
            <td class="label">Net (excl. IVA)</td>
            <td class="value" style="text-align:right" th:text="${#numbers.formatDecimal(doc.net, 1, 'COMMA', 2, 'POINT')} + ' €'">0,00 €</td>
        </tr>
        <tr>
            <td class="label">IVA (<span th:text="${doc.ivaPercent}">10</span>%)</td>
            <td class="value" style="text-align:right" th:text="${#numbers.formatDecimal(doc.iva, 1, 'COMMA', 2, 'POINT')} + ' €'">0,00 €</td>
        </tr>
        <tr class="gross">
            <td>TOTAL</td>
            <td style="text-align:right" th:text="${#numbers.formatDecimal(doc.gross, 1, 'COMMA', 2, 'POINT')} + ' €'">0,00 €</td>
        </tr>
    </table>

    <div th:if="${doc.comments != null and !doc.comments.isEmpty()}" style="margin-top: 24pt;">
        <div class="muted">Notes</div>
        <div th:text="${doc.comments}">—</div>
    </div>

    <div class="footer">Generated by onec ERP</div>
</body>
</html>
